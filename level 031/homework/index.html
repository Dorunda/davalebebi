<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<p style="color: blueviolet; background-color: aquamarine; text-align: center; font-size: medium;">hello world</p>
<p style="color: chartreuse; background-color: crimson; text-align: right; font-size: larger;">hello world</p>
<p style="color: red; background-color: black; text-align: initial; font-size: x-small;">hello world</p>
<p style="color: bisque; background-color: cadetblue; text-align: justify; font-size: x-large;">hello world</p>
<p style="color: aliceblue; background-color: blue; text-align: end; font-size: medium;">hello world</p>

</body>
</html>
