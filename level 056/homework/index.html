<!--position absolute-აკეთებს როდესაც ჩვენ შეგვიძლია  გავსტილოთ ელემენტი აბსოლიტური  კოორდინატიდან-->
<!-- position static-აკეთებს როდესაც ჩვენ არ შეგვიძლია ელემენტის გადაადგილება-->
 <!--relative -აკეთებს როდესაც ელემენტის გადაადგილება შეგვიძლია  საწყისი  ადგილიდან სადაც ჩვენ გვენდომება-->
<!--fixed-არის როდესაც აქვავებს ელემენტს სქროლვისას და ელემენტი მოგვყვება -->
<!--sticky-არის როდესაც თან შეგვიძლია გავიყოლოთ ელემენტი სქროლვისას და რომელსაც ჭირდება top თვისება>
<!-right-არის ელემენტის მარჯვნიდან მარცხნივ გადაადგილებისთვის->
<!-left-არის ელემენტის მარცხნიდან მარჯვნივ გადაადგილებისთვის->
<!-top-არის მაღლიდან დაბლა გადაადგილებისთვის->
<!-bottom-არის დაბლიდან მაღლა გადაადგილებისთვის->
